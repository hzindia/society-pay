version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: societypay
      POSTGRES_USER: societypay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-societypay_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U societypay"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./backend/scripts:/app/scripts

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # ══════════════════════════════════════════════════════════════════════════
  #  OPTIONAL PROFILES — activate with:  docker compose --profile <name> up -d
  # ══════════════════════════════════════════════════════════════════════════

  # ── Cloudflare Tunnel (FREE public URL with your custom domain) ──────────
  #    Activate: docker compose --profile tunnel up -d
  #    Requires: CLOUDFLARE_TUNNEL_TOKEN set in .env
  #    Result:   https://pay.yoursociety.com — free HTTPS, DDoS protection
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      - frontend
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

  # ── Caddy reverse proxy (auto HTTPS for VPS with public IP) ──────────────
  #    Activate: docker compose --profile production up -d
  #    Requires: PUBLIC_DOMAIN set in .env (e.g. pay.greenvalley.in)
  #    Result:   https://pay.greenvalley.in with auto Let's Encrypt certs
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
